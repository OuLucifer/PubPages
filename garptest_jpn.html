const auth = firebase.auth();

function toemail (idstr) {
  const email = idstr + '@example.jp';
  return email;
}

async function checkid(mturkid) {
  const providers = await auth.fetchSignInMethodsForEmail(toemail(mturkid));
  if ( providers["0"] === "password" ){
    console.log("exist");
    return true;
  } else {
    console.log("NOT exist");
  }
}

async function signup(mturkid, passwd) {
  const results = await auth.createUserWithEmailAndPassword(toemail(mturkid), passwd)
    .then( result => {
      console.log("sign-up succeeded");
      console.log(result.user.uid);
      return {res: result.user.uid, err: null};
    })
    .catch( error => {
      console.log('sign-up error');
      console.log(error.message);
      return {res: null, err: error.code};
    });
  return results;
}

async function signin(mturkid, passwd) {
  const results = await auth.signInWithEmailAndPassword(toemail(mturkid), passwd)
    .then( result => {
      console.log("sign-in succeeded");
      console.log(result.user.uid);
      return {res: result.user.uid, err: null};
    })
    .catch( error => {
      console.log('sign-in error');
      console.log(error.message);
      return {res: null, err: error.code};
    });
  return results;
}

function getRndStr(len){
  const str = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

  var result = "";
  for(var i=0;i<len;i++){
    result += str.charAt(Math.floor(Math.random() * str.length));
  }
  return result;
}
